name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3). If omitted, reads from Package.swift."
        required: false
        type: string
      cleanup_staging:
        description: "Delete .release/<version> staging directory after tagging"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: cdp-swift-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          startsWith(github.event.pull_request.head.ref, 'release/v')
        )
      }}

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine version
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SOURCE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            BRANCH_VERSION="${HEAD_REF#release/v}"
            CLEANUP_STAGING="true"
          else
            SOURCE_SHA=""
            BRANCH_VERSION="${{ inputs.version }}"
            CLEANUP_STAGING="${{ inputs.cleanup_staging }}"
          fi

          # Default to HEAD of main
          if [[ -z "${SOURCE_SHA}" ]]; then
            SOURCE_SHA="$(git rev-parse HEAD)"
          fi

          # Ensure we're on the correct commit
          git checkout "${SOURCE_SHA}"

          # Extract version from Package.swift
          PACKAGE_VERSION="$(sed -n 's/^[[:space:]]*let version = "\([^"]*\)"/\1/p' Package.swift)"
          if [[ -z "${PACKAGE_VERSION}" ]]; then
            echo "::error::Could not extract version from Package.swift"
            exit 1
          fi

          # Use branch version if available, otherwise package version
          EXPECTED_VERSION="${BRANCH_VERSION:-${PACKAGE_VERSION}}"

          if [[ "${EXPECTED_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "::error::Branch version '${EXPECTED_VERSION}' != Package.swift version '${PACKAGE_VERSION}'"
            exit 1
          fi

          # Validate semver (canonical regex; must match the producer
          # workflow exactly).
          if [[ ! "${PACKAGE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::Invalid semver: ${PACKAGE_VERSION}"
            exit 1
          fi

          # Reject v-prefixed versions: the binary target URL in
          # Package.swift hardcodes bare semver. A v-prefixed tag would
          # silently break SPM resolution for every consumer.
          if [[ "${PACKAGE_VERSION}" == v* ]]; then
            echo "::error::Public repo tag must be bare semver, not v-prefixed (got '${PACKAGE_VERSION}')"
            exit 1
          fi

          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cleanup_staging=${CLEANUP_STAGING}" >> "$GITHUB_OUTPUT"

      - name: Validate manifest schema
        # Validate the staged manifest with the jq-based script synced
        # from the producer repo. Catches malformed manifests (extra
        # fields, wrong types, bad URL pattern, etc.) before any further
        # checks run. jq is already a workflow dependency; no Node needed.
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ctx.outputs.version }}"
          MANIFEST=".release/${VERSION}/manifest.json"
          VALIDATOR="scripts/validate-manifest.sh"
          if [[ ! -x "${VALIDATOR}" ]]; then
            echo "::error::Missing or non-executable ${VALIDATOR} (synced from producer repo)"
            exit 1
          fi
          if [[ ! -f "${MANIFEST}" ]]; then
            echo "::error::Missing ${MANIFEST}"
            exit 1
          fi
          "${VALIDATOR}" "${MANIFEST}"

      - name: Validate release staging
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.ctx.outputs.version }}"
          MANIFEST=".release/${VERSION}/manifest.json"
          NOTES=".release/${VERSION}/RELEASE_NOTES.md"
          ASSET_DIR=".release/${VERSION}/assets"

          if [[ ! -f "${MANIFEST}" ]]; then
            echo "::error::Missing ${MANIFEST}"
            exit 1
          fi

          if [[ ! -f "${NOTES}" ]]; then
            echo "::error::Missing ${NOTES}"
            exit 1
          fi

          # Validate manifest version matches
          MANIFEST_VERSION="$(jq -r '.version' "${MANIFEST}")"
          if [[ "${MANIFEST_VERSION}" != "${VERSION}" ]]; then
            echo "::error::Manifest version '${MANIFEST_VERSION}' != expected '${VERSION}'"
            exit 1
          fi

          # Validate Package.swift checksum matches manifest
          PACKAGE_CHECKSUM="$(sed -n 's/^[[:space:]]*let checksum = "\([^"]*\)"/\1/p' Package.swift)"
          MANIFEST_CHECKSUM="$(jq -r '.binaryTarget.checksum' "${MANIFEST}")"
          if [[ "${PACKAGE_CHECKSUM}" != "${MANIFEST_CHECKSUM}" ]]; then
            echo "::error::Package.swift checksum '${PACKAGE_CHECKSUM}' != manifest checksum '${MANIFEST_CHECKSUM}'"
            exit 1
          fi

          # Required: xcframework zip must exist
          if [[ ! -f "${ASSET_DIR}/CDPCore.xcframework.zip" ]]; then
            echo "::error::Missing required asset: ${ASSET_DIR}/CDPCore.xcframework.zip"
            exit 1
          fi

          # Validate SHA-256 checksums for all assets listed in manifest
          echo "Validating asset checksums..."
          ASSET_COUNT="$(jq '.assets | length' "${MANIFEST}")"
          for i in $(seq 0 $((ASSET_COUNT - 1))); do
            ASSET_NAME="$(jq -r ".assets[${i}].name" "${MANIFEST}")"
            EXPECTED_SHA="$(jq -r ".assets[${i}].sha256" "${MANIFEST}")"
            ASSET_FILE="${ASSET_DIR}/${ASSET_NAME}"

            if [[ ! -f "${ASSET_FILE}" ]]; then
              IS_REQUIRED="$(jq -r ".assets[${i}].required" "${MANIFEST}")"
              if [[ "${IS_REQUIRED}" == "true" ]]; then
                echo "::error::Required asset missing: ${ASSET_NAME}"
                exit 1
              fi
              echo "  Skipping optional missing asset: ${ASSET_NAME}"
              continue
            fi

            ACTUAL_SHA="$(sha256sum "${ASSET_FILE}" | awk '{print $1}')"
            if [[ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]]; then
              echo "::error::SHA-256 mismatch for ${ASSET_NAME}: got ${ACTUAL_SHA}, expected ${EXPECTED_SHA}"
              exit 1
            fi
            echo "  ✓ ${ASSET_NAME}"
          done

          # Cross-check that binaryTarget.checksum (which is the value
          # SPM verifies at install time, identical to the output of
          # `swift package compute-checksum`) matches the SHA-256 of the
          # actual xcframework asset. Both are SHA-256 of the same file;
          # any divergence ships a binary that SPM will reject.
          XCFRAMEWORK_SHA="$(jq -r '.assets[] | select(.name == "CDPCore.xcframework.zip") | .sha256' "${MANIFEST}")"
          if [[ -z "${XCFRAMEWORK_SHA}" || "${XCFRAMEWORK_SHA}" == "null" ]]; then
            echo "::error::manifest.assets is missing CDPCore.xcframework.zip sha256"
            exit 1
          fi
          if [[ "${PACKAGE_CHECKSUM}" != "${XCFRAMEWORK_SHA}" ]]; then
            echo "::error::Package.swift/manifest checksum '${PACKAGE_CHECKSUM}' != xcframework asset SHA-256 '${XCFRAMEWORK_SHA}'"
            echo "::error::SPM consumers would reject the published binary."
            exit 1
          fi

          echo "manifest=${MANIFEST}" >> "$GITHUB_OUTPUT"
          echo "notes=${NOTES}" >> "$GITHUB_OUTPUT"
          echo "asset_dir=${ASSET_DIR}" >> "$GITHUB_OUTPUT"

      - name: Copy assets to temp
        id: files
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.ctx.outputs.version }}"
          ASSET_DIR="${{ steps.validate.outputs.asset_dir }}"
          TMP="${RUNNER_TEMP}/cdp-swift-release-${VERSION}"

          mkdir -p "${TMP}/assets"
          cp "${{ steps.validate.outputs.notes }}" "${TMP}/RELEASE_NOTES.md"

          # Copy all assets from staging
          for f in "${ASSET_DIR}"/*; do
            [[ -f "$f" ]] && cp "$f" "${TMP}/assets/$(basename "$f")"
          done

          echo "tmp=${TMP}" >> "$GITHUB_OUTPUT"

      - name: Cleanup staging and determine tag target
        id: tag_target
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.ctx.outputs.version }}"
          SOURCE_SHA="${{ steps.ctx.outputs.source_sha }}"
          CLEANUP="${{ steps.ctx.outputs.cleanup_staging }}"

          # Check if tag already exists
          if git show-ref --tags --verify --quiet "refs/tags/${VERSION}"; then
            TAG_TARGET="$(git rev-list -n 1 "${VERSION}")"
            echo "Tag ${VERSION} already exists at ${TAG_TARGET}"
            echo "tag_target=${TAG_TARGET}" >> "$GITHUB_OUTPUT"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_TARGET="${SOURCE_SHA}"

          if [[ "${CLEANUP}" == "true" ]]; then
            # Verify main hasn't advanced (avoid race)
            REMOTE_MAIN="$(git rev-parse origin/main)"
            if [[ "${REMOTE_MAIN}" != "${SOURCE_SHA}" ]]; then
              echo "::error::main has advanced from ${SOURCE_SHA} to ${REMOTE_MAIN}; aborting to avoid race"
              exit 1
            fi

            # Collect every blob path under .release/<version>/ (detached HEAD
            # is checked out at SOURCE_SHA by the Determine version step, so we
            # reference SOURCE_SHA explicitly rather than HEAD).
            mapfile -t DELETE_PATHS < <(
              git ls-tree -r --name-only "${SOURCE_SHA}" -- ".release/${VERSION}/"
            )

            if [[ "${#DELETE_PATHS[@]}" -gt 0 ]]; then
              BASE_TREE_SHA="$(git rev-parse "${SOURCE_SHA}^{tree}")"

              # Build a create-tree request body: base_tree + one null-sha entry
              # per path to delete. sha:null removes each blob; base_tree inherits
              # everything else, so any OTHER .release/* dirs are preserved
              # automatically, and the now-empty .release/<version>/ (and .release/
              # itself, if this was the only version) drops out — git has no empty
              # trees. Correct whether or not other versions are staged.
              TREE_BODY="$(
                printf '%s\n' "${DELETE_PATHS[@]}" \
                  | jq -R . \
                  | jq -s --arg base "${BASE_TREE_SHA}" \
                      '{base_tree: $base,
                        tree: map({path: ., mode: "100644", type: "blob", sha: null})}'
              )"

              NEW_TREE_SHA="$(printf '%s' "${TREE_BODY}" \
                | gh api "repos/${GITHUB_REPOSITORY}/git/trees" \
                    --method POST --input - --jq '.sha')"

              # Create signed commit via API (GitHub signs API-created commits).
              COMMIT_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/commits" \
                -f message="chore: clean release staging for v${VERSION} [skip ci]" \
                -f tree="${NEW_TREE_SHA}" \
                -f "parents[]=${SOURCE_SHA}" \
                --jq '.sha')"

              # Fast-forward main to the cleanup commit.
              gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/main" \
                --method PATCH \
                -f sha="${COMMIT_SHA}" \
                -F force=false

              TAG_TARGET="${COMMIT_SHA}"
              echo "Cleanup commit created via API: ${COMMIT_SHA}"
            else
              echo "No .release/${VERSION} directory to clean up"
            fi
          fi

          echo "tag_target=${TAG_TARGET}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        if: steps.tag_target.outputs.tag_exists == 'false'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.ctx.outputs.version }}"
          TAG_TARGET="${{ steps.tag_target.outputs.tag_target }}"

          # Create tag via GitHub API so it's signed with GitHub's GPG key
          TAG_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags" \
            -f tag="${VERSION}" \
            -f message="CDP Swift SDK v${VERSION}" \
            -f object="${TAG_TARGET}" \
            -f type="commit" \
            --jq '.sha')

          # Create the ref pointing to the tag object
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${VERSION}" \
            -f sha="${TAG_SHA}"

          echo "Tagged ${VERSION} at ${TAG_TARGET} (signed via API)"

      - name: Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.ctx.outputs.version }}"
          TMP="${{ steps.files.outputs.tmp }}"
          ASSET_DIR="${TMP}/assets"
          NOTES="${TMP}/RELEASE_NOTES.md"
          MANIFEST="${{ steps.validate.outputs.manifest }}"

          # Upload only assets that are listed in manifest.json. Each
          # entry was sha256-verified by the Validate release staging step,
          # so what we ship matches what was attested. Optional missing
          # assets (required==false) are silently skipped, mirroring the
          # validator's behavior.
          ASSETS=()
          ASSET_COUNT="$(jq '.assets | length' "${MANIFEST}")"
          for i in $(seq 0 $((ASSET_COUNT - 1))); do
            ASSET_NAME="$(jq -r ".assets[${i}].name" "${MANIFEST}")"
            ASSET_FILE="${ASSET_DIR}/${ASSET_NAME}"
            if [[ -f "${ASSET_FILE}" ]]; then
              ASSETS+=("${ASSET_FILE}#${ASSET_NAME}")
            fi
          done

          # Release flags
          FLAGS=(--repo "${GITHUB_REPOSITORY}" --title "v${VERSION}" --notes-file "${NOTES}" --verify-tag)

          # Mark prerelease for versions with hyphen (e.g. 1.0.0-alpha.1)
          if [[ "${VERSION}" == *-* ]]; then
            FLAGS+=(--prerelease --latest=false)
          else
            FLAGS+=(--latest)
          fi

          # Create or update release
          if gh release view "${VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists; updating assets..."
            gh release upload "${VERSION}" "${ASSETS[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
            gh release edit "${VERSION}" --repo "${GITHUB_REPOSITORY}" --title "v${VERSION}" --notes-file "${NOTES}"
          else
            gh release create "${VERSION}" "${ASSETS[@]}" "${FLAGS[@]}"
          fi

          echo ""
          echo "============================================"
          echo "  Released v${VERSION}"
          echo "  https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
          echo "============================================"
