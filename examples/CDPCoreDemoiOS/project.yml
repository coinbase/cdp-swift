name: CDPCoreDemoiOS
options:
  bundleIdPrefix: com.coinbase
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  CDPCore:
    url: https://github.com/coinbase/cdp-swift
    exactVersion: 0.0.0-alpha.5

targets:
  CDPCoreDemoiOS:
    type: application
    platform: iOS
    sources:
      - path: ../CDPCoreDemo/Sources/CDPCoreDemo
        excludes:
          - "Info.plist"
    resources:
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coinbase.CDPCoreDemo
        INFOPLIST_FILE: SupportingFiles/Info.plist
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/CDPCoreDemoiOS.entitlements
        SWIFT_VERSION: "5.9"
        PRODUCT_NAME: "CDP Wallets Demo"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: CDPCore
